_schema-version: "3.1"
ID: employee-service
description: CAP CDS Employee Management Service
version: 1.0.0

modules:
  - name: employee-service-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: employee-xsuaa
      - name: employee-alert-notification

resources:
  - name: employee-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: employee-service-${space}
        tenant-mode: dedicated

  - name: employee-alert-notification
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: alert-notification
