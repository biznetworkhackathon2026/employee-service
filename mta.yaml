_schema-version: "3.1"
ID: employee-service
description: CAP CDS Employee Management Service
version: 1.0.0

modules:
  - name: employee-service-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm
      build-result: .
      commands:
        - npm ci --production
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: employee-hana-db
      - name: employee-xsuaa
      - name: employee-alert-notification
      - name: employee-connectivity

  - name: employee-service-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
    requires:
      - name: employee-hana-db

resources:
  - name: employee-hana-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: employee-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: employee-service-${space}
        tenant-mode: dedicated

  - name: employee-alert-notification
    type: org.cloudfoundry.managed-service
    parameters:
      service: alert-notification
      service-plan: standard

  - name: employee-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite
