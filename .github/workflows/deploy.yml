name: Deploy to CF on PR Merge

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy CAP Service to Cloud Foundry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install CDS DK
        run: npm install -g @sap/cds-dk@^8

      - name: Build CDS (gen/srv)
        run: cds build --production
      
      - name: Install CF CLI
        run: |
          curl -L -o cf-cli.tgz "https://github.com/cloudfoundry/cli/releases/download/v8.7.10/cf8-cli_8.7.10_linux_x86-64.tgz"
          tar -zxf cf-cli.tgz
          sudo mv cf8 /usr/local/bin/cf
          cf --version 
          
      - name: Install MTA build tool
        run: |
          curl -L -o mta-build-tool.tar.gz "https://github.com/SAP/cloud-mta-build-tool/releases/download/v1.15.0/cloud-mta-build-tool_Linux_amd64.tar.gz"
          tar -zxf mta-build-tool.tar.gz
          sudo mv mbt /usr/local/bin/mbt
          mbt --version

      - name: CF Login
        run: |
          cf login \
            -a "${{ secrets.CF_API }}" \
            -u "${{ secrets.CF_USERNAME }}" \
            -p "${{ secrets.CF_PASSWORD }}" \
            -o "${{ secrets.CF_ORG }}" \
            -s "${{ secrets.CF_SPACE }}"

      - name: Build MTA archive
        run: mbt build -p cf

      - name: Deploy MTA to CF
        run: cf deploy mta_archives/*.mtar -f

      - name: Map friendly route
        run: |
          cf map-route employee-service-srv cfapps.us10-001.hana.ondemand.com \
            --hostname biznetworkhackathon2026-employee-service || true

      - name: Set GH_PAT env on CF app
        run: |
          cf set-env employee-service-srv GH_PAT "${{ secrets.GH_PAT }}"
          cf restart employee-service-srv
