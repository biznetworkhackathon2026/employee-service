name: Analyze Production Logs with MCP

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: 'Service to analyze'
        required: true
        default: 'employee-service-srv'
        type: choice
        options:
          - employee-service-srv
          - payroll-service-srv
          - timesheet-service-srv
          - notification-service-srv
          - config-service-srv
      time_window:
        description: 'Time window to analyze'
        required: false
        default: '-6h'
      create_pr:
        description: 'Auto-create PR with fix'
        required: false
        type: boolean
        default: true

  schedule:
    - cron: '0 2 * * *'

  repository_dispatch:
    types: [service-alert, analyze-alert]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print incident payload
        if: github.event_name == 'repository_dispatch'
        run: |
          echo "Service  : ${{ github.event.client_payload.service }}"
          echo "Endpoint : ${{ github.event.client_payload.endpoint }}"
          echo "Time     : ${{ github.event.client_payload.timestamp }}"

      - name: Analyze logs and generate fix using Copilot CLI + MCP
        id: analyze
        uses: austenstone/copilot-cli@v1.0
        with:
          github-token: ${{ secrets.GH_PAT }}
          prompt: |
            You are an SRE assistant. A production alert has fired for the employee-service on SAP BTP Cloud Foundry.

            SERVICE: ${{ github.event.inputs.service_name || github.event.client_payload.service || 'employee-service-srv' }}
            TIME WINDOW: ${{ github.event.inputs.time_window || '-6h' }}
            INCIDENT TIME: ${{ github.event.client_payload.timestamp || 'recent' }}
            ENDPOINT: ${{ github.event.client_payload.endpoint || 'unknown' }}

            STEPS:
            1. Use the alerts MCP server to call fetch_kibana_logs for the service above with log_level ERROR and the given time window. Get real logs — do not simulate or guess.
            2. Use query_prometheus_metrics to check memory_usage_bytes and errors_total for the same service and time window.
            3. Read the source code in srv/employee-service.js to understand the service logic.
            4. Based ONLY on what the logs and metrics show, identify the root cause.
            5. Propose a concrete code fix in srv/employee-service.js.
            6. If create_pr is true, create a branch named fix/sre-auto-<timestamp> and open a PR. Use a single-line commit message with no special characters.

            Do not assume or hardcode the error type. Let the logs tell you what is wrong.

          allow-all-tools: true
          model: gpt-4.1
          upload-artifact: true
          github-mcp-toolsets: all

          mcp-config: |
            {
              "mcpServers": {
                "alerts": {
                  "transport": {
                    "type": "sse",
                    "url": "${{ vars.ALERTS_MCP_URL }}/sse"
                  }
                }
              }
            }

      - name: Upload analysis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-analysis-report
          path: copilot-analysis.md
